<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Pittsburgh Steel meets
   Patent Office. Editorial-industrial.
   Dark amber on near-black. Grid-breaking.
═══════════════════════════════════════════ */
:root {
  --black:  #050608;
  --dark:   #0a0c0f;
  --panel:  #111318;
  --line:   rgba(210,170,60,0.15);
  --amber:  #d2aa3c;
  --amber2: #f0cc6e;
  --rust:   #b85c2a;
  --cream:  #f0ebe0;
  --fog:    rgba(240,235,224,0.6);
  --mist:   rgba(240,235,224,0.3);
  --dim:    rgba(240,235,224,0.12);
  --ff-display: 'DM Serif Display', Georgia, serif;
  --ff-body:    'Libre Baskerville', Georgia, serif;
  --ff-mono:    'DM Mono', 'Courier New', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--black);
  color:var(--cream);
  font-family:var(--ff-body);
  overflow-x:hidden;
  cursor:none;
}

/* ── CURSOR ── */
#cur,#cur2{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%)}
#cur{width:8px;height:8px;background:var(--amber);mix-blend-mode:difference}
#cur2{width:32px;height:32px;border:1px solid var(--amber);opacity:.5;transition:width .2s,height .2s,opacity .2s}
body:has(a:hover) #cur2,body:has(button:hover) #cur2{width:50px;height:50px;opacity:.9}

/* ── NOISE GRAIN OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;z-index:9997;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.4;
}

/* ── CANVAS ── */
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;touch-action:none;opacity:.2}

/* ── LAYOUT ── */
.page{position:relative;width:100%;min-height:100vh;z-index:2;display:none}
.page.active{display:block}

/* ── NAV ── */
nav{
  position:fixed;top:0;width:100%;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:24px 56px;
  background:linear-gradient(to bottom,rgba(5,6,8,.95),transparent);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.nav-brand{
  display:flex;flex-direction:column;gap:2px;cursor:pointer;
  text-decoration:none;
}
.nav-brand .logo{
  font-family:var(--ff-display);
  font-size:1.6rem;
  color:var(--amber);
  line-height:1;
}
.nav-brand .sub{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--mist);
}
.nav-links{display:flex;gap:0;list-style:none}
.nav-links li a{
  font-family:var(--ff-mono);
  font-size:.6rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--mist);
  text-decoration:none;
  padding:8px 18px;
  border:1px solid transparent;
  transition:color .3s,border-color .3s;
  cursor:pointer;
  display:block;
}
.nav-links li a:hover,.nav-links li a.active{color:var(--amber);border-color:var(--line)}

/* ── PAGE TRANSITIONS ── */
.page{opacity:0;transition:opacity .4s}
.page.active{opacity:1}

/* ══════════════════════════════
   PAGE 1 — HOME
══════════════════════════════ */
#home{
  min-height:100vh;
  padding:0 56px;
  display:grid;
  grid-template-rows:1fr auto;
  align-items:end;
  padding-bottom:80px;
  position:relative;
}
.home-top{
  padding-top:180px;
  max-width:1000px;
}
.home-kicker{
  font-family:var(--ff-mono);
  font-size:.6rem;
  letter-spacing:5px;
  text-transform:uppercase;
  color:var(--amber);
  margin-bottom:40px;
  opacity:0;animation:fadeUp .8s .2s forwards;
}
.home-headline{
  font-family:var(--ff-display);
  font-size:clamp(64px,10vw,148px);
  line-height:.92;
  color:var(--cream);
  margin-bottom:48px;
  opacity:0;animation:fadeUp .9s .4s forwards;
}
.home-headline .em{
  font-style:italic;
  color:var(--amber);
}
.home-deck{
  font-family:var(--ff-body);
  font-size:clamp(1rem,1.6vw,1.3rem);
  line-height:1.75;
  color:var(--fog);
  max-width:640px;
  font-style:italic;
  opacity:0;animation:fadeUp .8s .7s forwards;
}
.home-stats{
  display:flex;gap:0;margin-top:72px;
  border-top:1px solid var(--line);
  opacity:0;animation:fadeUp .8s .9s forwards;
}
.stat{
  padding:28px 48px 28px 0;
  border-right:1px solid var(--line);
  margin-right:48px;
}
.stat:last-child{border-right:none;margin-right:0}
.stat .n{
  font-family:var(--ff-display);
  font-size:3.2rem;
  color:var(--amber);
  line-height:1;
  display:block;
}
.stat .l{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--mist);
  margin-top:6px;
  display:block;
}
.home-cta{
  display:flex;gap:16px;margin-top:56px;
  opacity:1;
}

/* Pittsburgh identifier strip */
.pgh-strip{
  border-top:1px solid var(--line);
  padding:20px 0 0;
  display:flex;justify-content:space-between;align-items:center;
  opacity:0;animation:fadeIn .8s 1.5s forwards;
}
.pgh-strip p{
  font-family:var(--ff-mono);
  font-size:.55rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--mist);
}
.pgh-strip .westinghouse{
  font-family:var(--ff-body);
  font-style:italic;
  font-size:.7rem;
  color:var(--amber);
  opacity:.7;
}

/* Scroll line */
.scroll-hint{
  position:absolute;right:56px;bottom:40px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;animation:fadeIn 1s 2s forwards;
}
.scroll-hint span{
  font-family:var(--ff-mono);font-size:.45rem;
  letter-spacing:4px;color:var(--mist);
  writing-mode:vertical-rl;text-transform:uppercase;
}
.scroll-line{width:1px;height:56px;background:linear-gradient(to bottom,var(--amber),transparent);animation:pulse 2s infinite}

/* ══════════════════════════════
   PAGE 2 — INVENTIONS
══════════════════════════════ */
#inventions{padding:120px 56px 100px}
.page-hero{
  display:grid;grid-template-columns:1fr 2fr;
  gap:80px;align-items:end;
  margin-bottom:80px;padding-bottom:60px;
  border-bottom:1px solid var(--line);
}
.page-title{
  font-family:var(--ff-display);
  font-size:clamp(52px,7vw,100px);
  line-height:.9;
  color:var(--cream);
}
.page-title em{color:var(--amber);font-style:italic}
.page-intro{
  font-size:1.05rem;
  line-height:1.8;
  color:var(--fog);
  font-weight:400;
}

/* Portfolio groups */
.portfolio-group{margin-bottom:80px}
.group-header{
  display:flex;align-items:center;gap:24px;
  margin-bottom:40px;padding-bottom:20px;
  border-bottom:1px solid var(--line);
}
.group-label{
  font-family:var(--ff-mono);
  font-size:.6rem;letter-spacing:4px;
  text-transform:uppercase;color:var(--amber);
}
.group-title{
  font-family:var(--ff-display);
  font-size:1.6rem;
  color:var(--cream);
}
.group-tag{
  margin-left:auto;
  font-family:var(--ff-mono);font-size:.5rem;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--mist);
  border:1px solid var(--line);
  padding:4px 12px;
}

/* Invention cards */
.inv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}
.inv-grid.single{grid-template-columns:1fr}
.inv-card{
  background:var(--panel);
  border:1px solid var(--line);
  padding:44px;
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:border-color .4s,background .4s;
}
.inv-card:hover{border-color:rgba(210,170,60,.4);background:#141820}
.inv-card.flagship{
  grid-column:span 2;
  display:grid;grid-template-columns:3fr 2fr;
  gap:60px;align-items:center;
}
.card-glow{
  position:absolute;top:-100px;right:-100px;
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(210,170,60,.1),transparent 70%);
  pointer-events:none;opacity:0;transition:opacity .4s;
}
.inv-card:hover .card-glow{opacity:1}
.card-num{
  font-family:var(--ff-mono);font-size:.55rem;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--amber);margin-bottom:20px;
}
.card-name{
  font-family:var(--ff-display);
  font-size:clamp(22px,2.5vw,36px);
  line-height:1;color:var(--cream);
  margin-bottom:12px;
}
.card-sub{
  font-family:var(--ff-body);font-style:italic;
  font-size:.85rem;color:var(--amber);
  opacity:.8;margin-bottom:18px;
}
.card-body{
  font-size:.9rem;line-height:1.75;
  color:var(--mist);margin-bottom:28px;
}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.tag{
  font-family:var(--ff-mono);font-size:.5rem;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--amber);
  border:1px solid rgba(210,170,60,.25);
  padding:4px 10px;border-radius:1px;
}
.card-foot{
  font-family:var(--ff-mono);font-size:.55rem;
  letter-spacing:1px;color:var(--dim);
  border-top:1px solid var(--line);padding-top:20px;
}
.card-foot span{color:rgba(210,170,60,.6)}

/* Visual accents for flagship cards */
.inv-visual{display:flex;align-items:center;justify-content:center}
.orbit-wrap{position:relative;width:200px;height:200px}
.orbit{
  position:absolute;top:0;left:0;
  width:100%;height:100%;border-radius:50%;
  border:1px dashed rgba(210,170,60,.2);
}
.orbit:nth-child(2){inset:22px;border-color:rgba(210,170,60,.35);animation:spin 12s linear infinite reverse}
.orbit:nth-child(3){inset:44px;border-color:rgba(210,170,60,.55);animation:spin 7s linear infinite}
.orbit-core{
  position:absolute;inset:66px;border-radius:50%;
  border:2px solid var(--amber);
  background:radial-gradient(circle,rgba(210,170,60,.25),transparent);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
}
.orbit-core span{font-size:1.6rem}
.orbit-core small{
  font-family:var(--ff-mono);font-size:.4rem;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--amber);
}

/* WaterGuard note */
.waterguard-note{
  background:rgba(184,92,42,.08);
  border:1px solid rgba(184,92,42,.3);
  border-left:3px solid var(--rust);
  padding:16px 20px;margin-top:20px;
  font-family:var(--ff-mono);font-size:.6rem;
  letter-spacing:1px;color:rgba(240,235,224,.5);
  border-radius:2px;
}
.waterguard-note strong{color:var(--rust)}

/* ══════════════════════════════
   PAGE 3 — ORIGIN STORY
══════════════════════════════ */
#story{padding:120px 56px 100px}
.story-layout{
  display:grid;grid-template-columns:280px 1fr;
  gap:100px;align-items:start;
  max-width:1100px;
}
.story-sidebar{position:sticky;top:120px}
.story-chapter-list{list-style:none;margin-top:40px}
.story-chapter-list li{
  font-family:var(--ff-mono);font-size:.55rem;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--mist);padding:10px 0;
  border-bottom:1px solid var(--line);
  cursor:pointer;transition:color .3s;
}
.story-chapter-list li:hover,.story-chapter-list li.active{color:var(--amber)}
.story-quote-pull{
  margin-top:40px;padding:24px;
  border:1px solid var(--line);
  font-family:var(--ff-display);
  font-style:italic;font-size:1rem;
  color:var(--amber);line-height:1.5;
}
.story-body h2{
  font-family:var(--ff-display);
  font-size:clamp(32px,4vw,56px);
  line-height:1.1;color:var(--cream);
  margin-bottom:36px;
  padding-bottom:24px;
  border-bottom:1px solid var(--line);
}
.story-body h3{
  font-family:var(--ff-mono);
  font-size:.6rem;letter-spacing:4px;
  text-transform:uppercase;color:var(--amber);
  margin:48px 0 20px;
}
.story-body p{
  font-size:1.05rem;line-height:1.85;
  color:var(--fog);margin-bottom:24px;
}
.story-body p strong{color:var(--cream)}
.story-body blockquote{
  border-left:3px solid var(--amber);
  padding:4px 0 4px 32px;
  margin:40px 0;
  font-family:var(--ff-display);
  font-style:italic;
  font-size:clamp(1.2rem,2vw,1.7rem);
  color:var(--cream);line-height:1.4;
}
.story-body ul{
  margin:24px 0 24px 24px;
  color:var(--fog);
}
.story-body ul li{
  font-size:.95rem;line-height:1.8;
  margin-bottom:10px;
  padding-left:8px;
}
.story-body ul li::marker{color:var(--amber)}
.stat-callout{
  background:var(--panel);border:1px solid var(--line);
  padding:36px;margin:40px 0;
  display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;
}
.stat-callout .big-n{
  font-family:var(--ff-display);
  font-size:5rem;color:var(--amber);line-height:1;
}
.stat-callout p{font-size:.95rem;line-height:1.7;color:var(--fog)}

/* ══════════════════════════════
   PAGE 4 — AQD METHOD
══════════════════════════════ */
#method{padding:120px 56px 100px}
.method-hero{
  display:grid;grid-template-columns:1fr 1fr;
  gap:80px;margin-bottom:100px;
  padding-bottom:80px;border-bottom:1px solid var(--line);
  align-items:center;
}
.method-intro{
  font-size:1.1rem;line-height:1.8;
  color:var(--fog);
}
.method-intro p{margin-bottom:20px}
.method-steps{display:grid;gap:2px}
.step{
  background:var(--panel);border:1px solid var(--line);
  padding:40px 48px;
  display:grid;grid-template-columns:100px 1fr;
  gap:32px;align-items:start;
  transition:border-color .4s;cursor:default;
}
.step:hover{border-color:rgba(210,170,60,.4)}
.step-num{
  font-family:var(--ff-display);
  font-size:4rem;color:var(--dim);line-height:1;
  transition:color .4s;
}
.step:hover .step-num{color:rgba(210,170,60,.4)}
.step-name{
  font-family:var(--ff-display);
  font-size:1.5rem;color:var(--cream);
  margin-bottom:12px;
}
.step-body{
  font-size:.9rem;line-height:1.75;
  color:var(--mist);
}
.step-body strong{color:var(--amber)}

/* ══════════════════════════════
   PAGE 5 — INVESTORS
══════════════════════════════ */
#investors{padding:120px 56px 100px}
.inv-hero-split{
  display:grid;grid-template-columns:1fr 1fr;
